<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercício 1</title>
</head>
<body>
    <label for="salarioAtual">Salário Atual: </label>
    <input type="number" id="salarioAtual" name="salarioAtual" required>

    <button id="reajustar>" type="submit">Reajustar</button>

    <!--
    *o salário antes do reajuste;
    *o percentual de aumento aplicado;
    *o valor do aumento;
    *o novo salário, após o aumento. -->


    <p>Salário atual(antes do reajuste): <span id="salarioAntigo"></span></p>
    <p>percentual de almento aplicado: <span id="reajustePercentual"></span></p>
    <p>Valor do almento: <span id="reajusteValor"></span></p>
    <p>Seu salario agora sera de: <span  id="salarioNovo"></span></p>
    <script src="salario.js"></script>

</body>
</html>
